name: Deploy to Aliyun ECS

on:
  push:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

env:
  ACR_REGISTRY: crpi-iha8jo2ibb5catip.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_IMAGE: ${{ vars.ACR_REGISTRY || 'crpi-iha8jo2ibb5catip.cn-guangzhou.personal.cr.aliyuncs.com' }}/cs-agent/cs-smart
  ECS_HOST: 114.55.101.73
  ECS_USER: admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── 构建后端镜像 ─────────────────────────
      - name: Build and push (backend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_IMAGE }}:latest
            ${{ env.ACR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 构建前端镜像 ─────────────────────────
      - name: Build and push (frontend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.ACR_IMAGE }}:frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 部署到 ECS ───────────────────────────
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            cd ~/cs-agent
            echo "[→] 同步 docker-compose.yml..."
            curl -fsSL https://raw.githubusercontent.com/wf23801400/smart-cs-agent/master/docker-compose.yml -o docker-compose.yml
            echo "[→] 登录 ACR..."
            echo "${{ secrets.ACR_PASSWORD }}" | docker login --username ${{ secrets.ACR_USERNAME }} --password-stdin ${{ env.ACR_REGISTRY }}
            echo "[→] 拉取最新镜像..."
            docker compose pull
            echo "[→] 重启服务..."
            docker compose up -d --remove-orphans
            echo "[→] 等待健康检查..."
            sleep 8
            curl -sf http://localhost:8000/health && echo "" && echo "[✓] 部署成功" || echo "[!] 健康检查失败"

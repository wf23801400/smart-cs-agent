# ============================================
# Smart CS Agent — 生产部署（ACR 镜像 + Nginx 前端）
# ============================================

services:
  # ── 客服 Agent 本体（仅内网，通过 nginx 访问） ──
  cs-agent:
    image: crpi-iha8jo2ibb5catip.cn-guangzhou.personal.cr.aliyuncs.com/cs-agent/cs-smart:latest
    pull_policy: always
    container_name: cs-agent
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - APP_ENV=prod
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - qdrant_data:/app/data/qdrant_db
      - mem0_data:/app/data/mem0_qdrant
      - ./backend/data/knowledge:/app/data/knowledge:ro
      - logs:/app/logs
    networks:
      - cs-network

  # ── 前端（React 构建 + Nginx 反代，自动注入 API Key） ──
  cs-frontend:
    image: crpi-iha8jo2ibb5catip.cn-guangzhou.personal.cr.aliyuncs.com/cs-agent/cs-smart:frontend
    pull_policy: always
    container_name: cs-frontend
    ports:
      - "8000:80"
    environment:
      - API_KEY=${API_KEY}
    depends_on:
      - cs-agent
    restart: unless-stopped
    networks:
      - cs-network

  # ── MySQL 8.0 ───────────────────────────────
  mysql:
    image: mysql:8.0.36
    container_name: cs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-Root123!@#}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_cs_agent}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    networks:
      - cs-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --performance-schema=OFF

  # ── Redis 7 ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - cs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  mem0_data:
  logs:

networks:
  cs-network:
    driver: bridge

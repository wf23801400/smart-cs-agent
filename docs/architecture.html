<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart CS Agent Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
    font-family: 'Inter', 'JetBrains Mono', monospace;
  }

  .diagram-container {
    max-width: 1300px;
    width: 100%;
    background: #0a0f1e;
    border-radius: 20px;
    border: 1px solid rgba(148, 163, 184, 0.1);
    overflow: hidden;
    box-shadow:
      0 0 60px rgba(0,0,0,0.6),
      0 0 120px rgba(59, 130, 246, 0.05);
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
<div class="diagram-container">

<svg viewBox="0 0 1200 950" xmlns="http://www.w3.org/2000/svg"
     font-family="'JetBrains Mono', 'Inter', monospace">

  <!-- ===== DEFS ===== -->
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148,163,184,0.04)" stroke-width="0.5"/>
    </pattern>
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="rgba(148,163,184,0.06)"/>
    </pattern>

    <!-- Glow Filters -->
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowViolet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowRose" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Arrowhead Markers -->
    <marker id="arrowSolid" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#64748b"/>
    </marker>
    <marker id="arrowRose" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#fb7185"/>
    </marker>
    <marker id="arrowViolet" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#a78bfa"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#fbbf24"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#22d3ee"/>
    </marker>

    <!-- Gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Component gradients -->
    <linearGradient id="gradEmerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(6,78,59,0.5)"/>
      <stop offset="100%" stop-color="rgba(6,78,59,0.25)"/>
    </linearGradient>
    <linearGradient id="gradViolet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(76,29,149,0.5)"/>
      <stop offset="100%" stop-color="rgba(76,29,149,0.25)"/>
    </linearGradient>
    <linearGradient id="gradAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(120,53,15,0.4)"/>
      <stop offset="100%" stop-color="rgba(120,53,15,0.2)"/>
    </linearGradient>
    <linearGradient id="gradSlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30,41,59,0.6)"/>
      <stop offset="100%" stop-color="rgba(30,41,59,0.35)"/>
    </linearGradient>
    <linearGradient id="gradRose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(136,19,55,0.5)"/>
      <stop offset="100%" stop-color="rgba(136,19,55,0.3)"/>
    </linearGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1200" height="950" fill="#020617"/>
  <rect width="1200" height="950" fill="url(#dotGrid)"/>
  <rect width="1200" height="950" fill="url(#grid)"/>

  <!-- Subtle ambient glow -->
  <circle cx="370" cy="300" r="200" fill="rgba(52,211,153,0.02)" filter="url(#glowEmerald)"/>
  <circle cx="370" cy="560" r="160" fill="rgba(167,139,250,0.02)" filter="url(#glowViolet)"/>
  <circle cx="370" cy="685" r="140" fill="rgba(251,191,36,0.02)" filter="url(#glowAmber)"/>

  <!-- ===== TITLE SECTION ===== -->
  <text x="600" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="url(#titleGrad)" letter-spacing="1">
    Smart CS Agent Architecture
  </text>
  <text x="600" y="54" text-anchor="middle" font-size="12" fill="#64748b" font-weight="400">
    多Agent智能客服系统 — LangGraph + FastAPI + Qdrant
  </text>

  <!-- ===== ARROWS (drawn behind components) ===== -->

  <!-- 1. Java → FastAPI (solid, main request flow) -->
  <line x1="200" y1="90" x2="273" y2="90" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="236" y="78" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="'JetBrains Mono',monospace">
    HTTP + X-API-Key
  </text>

  <!-- 2. FastAPI → Dispatcher -->
  <line x1="370" y1="130" x2="370" y2="173" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSolid)"/>

  <!-- 3. Dispatcher → Cache (horizontal) -->
  <line x1="460" y1="202" x2="503" y2="202" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrowViolet)"/>
  <text x="481" y="196" text-anchor="middle" font-size="8" fill="#a78bfa" font-family="'JetBrains Mono',monospace">查询</text>

  <!-- Cache → Dispatcher (hit, dashed) -->
  <line x1="503" y1="212" x2="460" y2="212" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowViolet)"/>
  <text x="481" y="224" text-anchor="middle" font-size="7" fill="#a78bfa" font-family="'JetBrains Mono',monospace">命中直达</text>

  <!-- 4. Dispatcher → Sub-agents (distribution) -->
  <!-- Main vertical from Dispatcher bottom to distribution line -->
  <line x1="370" y1="230" x2="370" y2="258" stroke="#64748b" stroke-width="1.8"/>
  <!-- Horizontal distribution line -->
  <line x1="155" y1="258" x2="680" y2="258" stroke="#64748b" stroke-width="1.5"/>
  <!-- Drops to each sub-agent -->
  <line x1="155" y1="258" x2="155" y2="283" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrowSolid)"/>
  <line x1="330" y1="258" x2="330" y2="283" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrowSolid)"/>
  <line x1="505" y1="258" x2="505" y2="283" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrowSolid)"/>
  <line x1="680" y1="258" x2="680" y2="283" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrowSolid)"/>

  <!-- Intent labels on distribution arrows -->
  <text x="155" y="275" text-anchor="middle" font-size="7" fill="#34d399" font-family="'JetBrains Mono',monospace">faq</text>
  <text x="330" y="275" text-anchor="middle" font-size="7" fill="#34d399" font-family="'JetBrains Mono',monospace">return</text>
  <text x="505" y="275" text-anchor="middle" font-size="7" fill="#34d399" font-family="'JetBrains Mono',monospace">complaint</text>
  <text x="680" y="275" text-anchor="middle" font-size="7" fill="#34d399" font-family="'JetBrains Mono',monospace">general</text>

  <!-- 5. Sub-agents → Coordinator -->
  <line x1="155" y1="355" x2="155" y2="395" stroke="#64748b" stroke-width="1.5"/>
  <line x1="330" y1="355" x2="330" y2="395" stroke="#64748b" stroke-width="1.5"/>
  <line x1="505" y1="355" x2="505" y2="395" stroke="#64748b" stroke-width="1.5"/>
  <line x1="680" y1="355" x2="680" y2="395" stroke="#64748b" stroke-width="1.5"/>
  <!-- Merge lines to Coordinator -->
  <line x1="155" y1="395" x2="680" y2="395" stroke="#64748b" stroke-width="1.5"/>
  <line x1="370" y1="395" x2="370" y2="408" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSolid)"/>

  <!-- 6. Coordinator → FastAPI (response, dashed) -->
  <path d="M 460 440 L 700 440 L 700 90 L 467 90" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowSolid)"/>
  <text x="705" y="270" font-size="9" fill="#64748b" font-family="'JetBrains Mono',monospace" transform="rotate(90,705,270)">响应返回</text>

  <!-- 7. FastAPI → Java (response, dashed) -->
  <line x1="200" y1="105" x2="273" y2="105" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowSolid)"/>

  <!-- 8. FastAPI → Redis (rate limit check, rose dashed) -->
  <path d="M 370 130 L 370 148 L 650 148 L 650 500 L 400 500 L 400 523" fill="none" stroke="#fb7185" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrowRose)"/>
  <text x="655" y="320" font-size="7" fill="#fb7185" font-family="'JetBrains Mono',monospace" transform="rotate(90,655,320)">
    rate_limit check
  </text>

  <!-- 9. Sub-agents ↔ Data stores (dashed) -->
  <!-- FAQ Agent → Qdrant -->
  <path d="M 155 355 L 155 420 L 110 420 L 110 523" fill="none" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowViolet)"/>
  <!-- Qdrant → FAQ Agent (return) -->
  <line x1="110" y1="523" x2="110" y2="420" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="112" y="472" font-size="7" fill="#a78bfa" font-family="'JetBrains Mono',monospace">vector search</text>

  <!-- Return Agent → MySQL -->
  <line x1="330" y1="355" x2="330" y2="523" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowViolet)"/>
  <text x="332" y="445" font-size="7" fill="#a78bfa" font-family="'JetBrains Mono',monospace">session R/W</text>

  <!-- Complaint Agent → Redis -->
  <line x1="505" y1="355" x2="505" y2="523" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowViolet)"/>

  <!-- General Agent → Mem0 -->
  <line x1="680" y1="355" x2="680" y2="420" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="680" y1="420" x2="545" y2="420" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="545" y1="420" x2="545" y2="523" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowViolet)"/>
  <text x="612" y="415" font-size="7" fill="#a78bfa" font-family="'JetBrains Mono',monospace">profile R/W</text>

  <!-- 10. Sub-agents → External APIs (solid) -->
  <!-- FAQ Agent → DeepSeek API -->
  <path d="M 155 355 L 155 500 L 115 500 L 115 653" fill="none" stroke="#fbbf24" stroke-width="1.3" marker-end="url(#arrowAmber)"/>
  <text x="118" y="580" font-size="7" fill="#fbbf24" font-family="'JetBrains Mono',monospace">LLM call</text>

  <!-- FAQ Agent → SiliconFlow API -->
  <path d="M 155 355 L 200 500 L 260 500 L 260 653" fill="none" stroke="#fbbf24" stroke-width="1.3" marker-end="url(#arrowAmber)"/>
  <text x="210" y="580" font-size="7" fill="#fbbf24" font-family="'JetBrains Mono',monospace">embedding</text>

  <!-- All agents → LangSmith (tracing) -->
  <path d="M 680 355 L 750 355 L 750 653 L 410 653" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <text x="755" y="510" font-size="7" fill="#fbbf24" font-family="'JetBrains Mono',monospace" transform="rotate(90,755,510)">
    tracing
  </text>

  <!-- ===== COMPONENTS ===== -->

  <!-- === COMPONENT: Java 主系统 (External/Slate) === -->
  <rect x="30" y="60" width="170" height="60" rx="8" fill="url(#gradSlate)" stroke="#475569" stroke-width="1.5"/>
  <rect x="30" y="60" width="170" height="60" rx="8" fill="rgba(30,41,59,0.4)" stroke="#94a3b8" stroke-width="1.2"/>
  <!-- Icon: server -->
  <rect x="43" y="76" width="14" height="10" rx="2" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <rect x="47" y="80" width="6" height="3" rx="1" fill="#94a3b8"/>
  <circle cx="50" cy="92" r="1.5" fill="#22d3ee"/>
  <text x="64" y="84" font-size="10" font-weight="600" fill="#cbd5e1">Java 主系统</text>
  <text x="64" y="98" font-size="8" fill="#64748b">电商平台</text>

  <!-- === COMPONENT: FastAPI Gateway (Emerald/Backend) === -->
  <rect x="280" y="50" width="180" height="80" rx="8" fill="url(#gradEmerald)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="280" y="50" width="180" height="80" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.2" filter="url(#glowEmerald)"/>
  <!-- Icon: gateway -->
  <polygon points="293,72 300,65 307,72 304,72 304,82 296,82 296,72" fill="none" stroke="#34d399" stroke-width="1"/>
  <text x="316" y="75" font-size="11" font-weight="700" fill="#6ee7b7">FastAPI Gateway</text>
  <text x="316" y="90" font-size="8" fill="#34d399" font-family="'JetBrains Mono',monospace">:8001</text>
  <text x="316" y="104" font-size="6.5" fill="#64748b" font-family="'JetBrains Mono',monospace">/health · /docs (公开)</text>

  <!-- Middleware badges inside FastAPI -->
  <rect x="290" y="110" width="74" height="16" rx="4" fill="rgba(136,19,55,0.5)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="327" y="120" text-anchor="middle" font-size="6.5" fill="#fda4af" font-family="'JetBrains Mono',monospace">auth_mw</text>

  <rect x="370" y="110" width="82" height="16" rx="4" fill="rgba(136,19,55,0.5)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="411" y="120" text-anchor="middle" font-size="6.5" fill="#fda4af" font-family="'JetBrains Mono',monospace">rate_limit_mw</text>

  <!-- === COMPONENT: Dispatcher (Emerald/Backend) === -->
  <rect x="280" y="180" width="180" height="50" rx="8" fill="url(#gradEmerald)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="280" y="180" width="180" height="50" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.2"/>
  <!-- Icon: brain/split -->
  <circle cx="296" cy="205" r="7" fill="none" stroke="#34d399" stroke-width="1"/>
  <line x1="291" y1="205" x2="301" y2="205" stroke="#34d399" stroke-width="1"/>
  <line x1="296" y1="200" x2="296" y2="210" stroke="#34d399" stroke-width="1"/>
  <text x="310" y="200" font-size="11" font-weight="700" fill="#6ee7b7">Dispatcher</text>
  <text x="310" y="215" font-size="8" fill="#34d399">意图分类器 (Intent Classifier)</text>

  <!-- === COMPONENT: Cache (Violet/Database) === -->
  <rect x="510" y="180" width="100" height="45" rx="8" fill="url(#gradViolet)" stroke="#6d28d9" stroke-width="1.5"/>
  <rect x="510" y="180" width="100" height="45" rx="8" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <!-- Icon: database cylinder -->
  <ellipse cx="528" cy="199" rx="6" ry="3" fill="none" stroke="#a78bfa" stroke-width="1"/>
  <rect x="522" y="199" width="12" height="8" rx="1" fill="none" stroke="#a78bfa" stroke-width="1"/>
  <text x="544" y="200" font-size="9" font-weight="600" fill="#c4b5fd">Cache</text>
  <text x="544" y="213" font-size="7" fill="#a78bfa">响应缓存</text>

  <!-- === COMPONENTS: 4 Sub-Agents (Emerald/Backend) === -->

  <!-- FAQ Agent -->
  <rect x="80" y="290" width="150" height="65" rx="8" fill="url(#gradEmerald)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="80" y="290" width="150" height="65" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.2"/>
  <text x="92" y="311" font-size="10" font-weight="700" fill="#6ee7b7">FAQ Agent</text>
  <text x="92" y="327" font-size="7.5" fill="#34d399">知识库问答</text>
  <text x="92" y="342" font-size="7" fill="#6ee7b7" font-family="'JetBrains Mono',monospace">Qdrant 向量检索</text>

  <!-- Return Agent -->
  <rect x="255" y="290" width="150" height="65" rx="8" fill="url(#gradEmerald)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="255" y="290" width="150" height="65" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.2"/>
  <text x="267" y="311" font-size="10" font-weight="700" fill="#6ee7b7">Return Agent</text>
  <text x="267" y="327" font-size="7.5" fill="#34d399">退换货流程</text>
  <text x="267" y="342" font-size="7" fill="#6ee7b7" font-family="'JetBrains Mono',monospace">退货/换货/退款</text>

  <!-- Complaint Agent -->
  <rect x="430" y="290" width="150" height="65" rx="8" fill="url(#gradEmerald)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="430" y="290" width="150" height="65" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.2"/>
  <text x="442" y="311" font-size="10" font-weight="700" fill="#6ee7b7">Complaint Agent</text>
  <text x="442" y="327" font-size="7.5" fill="#34d399">投诉处理</text>
  <text x="442" y="342" font-size="7" fill="#6ee7b7" font-family="'JetBrains Mono',monospace">工单升级/安抚</text>

  <!-- General Agent -->
  <rect x="605" y="290" width="150" height="65" rx="8" fill="url(#gradEmerald)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="605" y="290" width="150" height="65" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.2"/>
  <text x="617" y="311" font-size="10" font-weight="700" fill="#6ee7b7">General Agent</text>
  <text x="617" y="327" font-size="7.5" fill="#34d399">通用对话</text>
  <text x="617" y="342" font-size="7" fill="#6ee7b7" font-family="'JetBrains Mono',monospace">兜底 + 人工升级</text>

  <!-- LangGraph label -->
  <text x="415" y="375" text-anchor="middle" font-size="7" fill="#475569" font-family="'JetBrains Mono',monospace">
    — LangGraph Multi-Agent Subgraphs —
  </text>

  <!-- === COMPONENT: Coordinator (Emerald/Backend) === -->
  <rect x="280" y="415" width="180" height="50" rx="8" fill="url(#gradEmerald)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="280" y="415" width="180" height="50" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.2"/>
  <!-- Icon: merge -->
  <path d="M 296,432 L 302,438 L 296,444" fill="none" stroke="#34d399" stroke-width="1.2"/>

  <text x="318" y="436" font-size="11" font-weight="700" fill="#6ee7b7">Coordinator</text>

  <!-- === COMPONENTS: Data Stores (Violet/Database) === -->

  <!-- Qdrant -->
  <rect x="50" y="530" width="120" height="70" rx="8" fill="url(#gradViolet)" stroke="#6d28d9" stroke-width="1.5"/>
  <rect x="50" y="530" width="120" height="70" rx="8" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2" filter="url(#glowViolet)"/>
  <ellipse cx="80" cy="548" rx="8" ry="4" fill="none" stroke="#a78bfa" stroke-width="1.2"/>

  <text x="100" y="565" font-size="7" fill="#a78bfa">向量知识库</text>
  <text x="100" y="578" font-size="6.5" fill="#8b5cf6" font-family="'JetBrains Mono',monospace">bge-large-zh</text>
  <text x="100" y="590" font-size="6.5" fill="#7c3aed" font-family="'JetBrains Mono',monospace">FAQ chunks</text>

  <!-- MySQL -->
  <rect x="195" y="530" width="120" height="70" rx="8" fill="url(#gradViolet)" stroke="#6d28d9" stroke-width="1.5"/>
  <rect x="195" y="530" width="120" height="70" rx="8" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <ellipse cx="225" cy="548" rx="8" ry="4" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
  <rect x="217" y="548" width="16" height="12" rx="2" fill="none" stroke="#a78bfa" stroke-width="1"/>
